name: CI

on:
  push:
  pull_request:

env:
  RUN_MII_CONNECT: "false"

jobs:
  build:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --workspace

  test:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run workspace tests (best effort)
        continue-on-error: true
        run: cargo test --workspace --all-targets
      - name: Run MII Connect validation (optional)
        if: env.RUN_MII_CONNECT == 'true'
        run: |
          cargo run -p ferrum-cli -- mii validate \
            --input profiles/mii/samples/default17-bundle.json \
            --manifest profiles/mii/manifest.json \
            --strict \
            --output mii-conformance-report.json
      - name: Upload MII Connect report (optional)
        if: always() && env.RUN_MII_CONNECT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mii-conformance-report
          path: mii-conformance-report.json

  # Lesson 8: keep benchmark targets and optional features compiling (no full bench run in CI).
  bench-and-features:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install libdeflate (for ferrum-core --features libdeflate)
        run: sudo apt-get update && sudo apt-get install -y libdeflate-dev
      - run: cargo bench -p ferrum-bench --no-run
      - run: cargo check -p ferrum-storage --features opendal
      - run: cargo check -p ferrum-core --features libdeflate
      - run: cargo check -p ferrum-drs --features bam-lazy-ingest
      - run: cargo check -p ferrum-mii-connect
