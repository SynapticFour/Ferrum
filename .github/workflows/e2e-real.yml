name: E2E (Real Workflows)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *" # nightly on main

jobs:
  e2e-real:
    name: Real-world E2E smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ferrum
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Start Ferrum demo stack
        run: |
          set -e
          docker compose -f deploy/docker-compose.yml build --no-cache ferrum-init ferrum-gateway
          if ! docker compose -f deploy/docker-compose.yml up -d --build; then
            echo "docker compose up failed; gateway logs:"
            docker compose -f deploy/docker-compose.yml logs ferrum-gateway 2>&1 | tail -120 || true
            exit 1
          fi
          echo "Waiting for gateway /health (up to 120s)..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8080/health >/dev/null; then
              echo "Gateway ready."
              break
            fi
            if [ "$i" -eq 24 ]; then
              echo "Gateway did not become healthy."
              docker compose -f deploy/docker-compose.yml logs ferrum-gateway 2>&1 | tail -80
              exit 1
            fi
            sleep 5
          done

      - name: Verify demo DRS objects
        run: |
          for id in demo-1000genomes-chr22 test-object-1; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ga4gh/drs/v1/objects/$id || echo "000")
            if [ "$code" != "200" ]; then
              echo "DRS object $id not available (code=$code)"
              exit 1
            fi
          done

      - name: Basic WES run (JSON echo)
        run: |
          body='{"workflow_type":"CWL","workflow_type_version":"1.0","workflow_url":"workflow.cwl","workflow_params":{}}'
          curl -sf -H "Content-Type: application/json" -d "$body" http://localhost:8080/ga4gh/wes/v1/runs > run.json
          jq -e '.run_id' run.json >/dev/null

      - name: WES output sampling (output_files + RO-Crate)
        run: |
          set -e
          run_id="$(jq -r '.run_id' run.json)"
          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "Missing run_id"
            exit 1
          fi

          # Poll until terminal state (best-effort; demo stacks should complete quickly).
          state=""
          for _ in $(seq 1 60); do
            state="$(curl -sf http://localhost:8080/ga4gh/wes/v1/runs/"$run_id"/status | jq -r '.state' || true)"
            case "$state" in
              COMPLETE|CANCELED|EXECUTOR_ERROR|SYSTEM_ERROR)
                break
                ;;
            esac
            sleep 2
          done

          if [ -z "$state" ] || [ "$state" = "null" ]; then
            echo "Run did not reach a terminal state in time"
            exit 1
          fi

          # Validate our output sampling extension is present.
          run_log="$(curl -sf http://localhost:8080/ga4gh/wes/v1/runs/"$run_id")"
          echo "$run_log" | jq -e '.outputs.output_files != null' >/dev/null

          # Validate RO-Crate export endpoint still works (zip and metadata json parseable).
          curl -sf http://localhost:8080/ga4gh/wes/v1/runs/"$run_id"/export/ro-crate -o rocrate.zip
          python - <<'PY'
          import json, zipfile
          z = zipfile.ZipFile("rocrate.zip")
          with z.open("ro-crate-metadata.json") as f:
              json.load(f)
          print("ro-crate-metadata.json OK")
          PY

      - name: Stop Ferrum stack
        if: always()
        run: docker compose -f deploy/docker-compose.yml down -v --remove-orphans || true

