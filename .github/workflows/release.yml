name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset_name: ferrum-gateway-x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            asset_name: ferrum-gateway-aarch64-unknown-linux-musl
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: ferrum-gateway-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: ferrum-gateway-x86_64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-

      - name: Install cross (Linux musl targets)
        if: contains(matrix.target, 'musl')
        run: cargo install cross --locked

      - name: Build (musl via cross)
        if: contains(matrix.target, 'musl')
        run: cross build --release -p ferrum-gateway --target ${{ matrix.target }}

      - name: Build (macOS native)
        if: ${{ !contains(matrix.target, 'musl') }}
        run: cargo build --release -p ferrum-gateway --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/ferrum-gateway release/
          tar -czvf ${{ matrix.asset_name }}.tar.gz -C release ferrum-gateway

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Move artifacts to root
        run: |
          for d in artifacts/*/; do
            [ -d "$d" ] && cp "$d"*.tar.gz . || true
          done
          ls -la *.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          generate_release_notes: true
          files: '*.tar.gz'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
