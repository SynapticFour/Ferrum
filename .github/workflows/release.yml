name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset_name: ferrum-gateway-x86_64-unknown-linux-musl
            use_cross: false
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            asset_name: ferrum-gateway-aarch64-unknown-linux-musl
            use_cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: ferrum-gateway-aarch64-apple-darwin
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: ferrum-gateway-x86_64-apple-darwin
            use_cross: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install musl (Linux x86_64)
        if: matrix.os == 'ubuntu-latest' && matrix.use_cross == false
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.use_cross == true
        run: cargo install cross

      - name: Add target (macOS)
        if: matrix.os == 'macos-latest'
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-

      - name: Build (cargo)
        if: matrix.use_cross == false
        run: cargo build --release -p ferrum-gateway --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release -p ferrum-gateway --target ${{ matrix.target }}

      - name: Prepare archive
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/ferrum-gateway release/
          tar -czvf ${{ matrix.asset_name }}.tar.gz -C release ferrum-gateway

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts to root
        run: |
          for d in artifacts/*/; do
            [ -d "$d" ] && cp "$d"*.tar.gz . || true
          done
          ls -la *.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: '*.tar.gz'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
