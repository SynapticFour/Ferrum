services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ferrum
      POSTGRES_PASSWORD: ferrum-demo
      POSTGRES_DB: ferrumdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ferrum"]
      interval: 5s
      timeout: 5s
      retries: 10

  gateway:
    image: ghcr.io/synapticfour/ferrum:latest
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://ferrum:ferrum-demo@postgres/ferrumdb
      FERRUM_ENVIRONMENT: demo
      FERRUM_JWT_SECRET: demo-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    image: ghcr.io/synapticfour/ferrum-ui:latest
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - gateway
