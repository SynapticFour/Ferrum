[graph]
targets            = []
exclude-unpublished = true

[advisories]
yanked       = "warn"
unmaintained = "workspace"
ignore       = []

[licenses]
version               = 2
confidence-threshold  = 0.8
# BUSL-1.1 compatible; GPL/AGPL/LGPL not in allow list → denied by default
# BUSL-1.1 is Ferrum's own license (workspace crates)
allow = [
    "BUSL-1.1",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "OpenSSL",
    "CC0-1.0",
]
# Workspace crates (Ferrum) use BUSL-1.1; only check dependencies
[licenses.private]
ignore = true

[[licenses.clarify]]
name          = "ring"
expression    = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# No license in Cargo.toml; Fuchsia project uses BSD-3-Clause
[[licenses.clarify]]
name       = "fuchsia-cprng"
version    = "0.1.1"
expression = "BSD-3-Clause"
license-files = [{ path = "LICENSE", hash = 0xf04ece33 }]

[bans]
multiple-versions = "warn"
wildcards         = "deny"
highlight         = "all"
deny              = []
skip              = []

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
