# Ferrum local demo - single command: docker compose up
# Services: gateway, postgres, minio, keycloak, ferrum-ui, init
# Usage: make demo  (or: docker compose -f deploy/docker-compose.yml up -d)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ferrum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ferrum}
      POSTGRES_DB: ${POSTGRES_DB:-ferrum}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ferrum} -d ${POSTGRES_DB:-ferrum}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    # MinIO image is minimal (no curl/mc); init script waits with nc
    restart: unless-stopped

  keycloak:
    image: keycloak/keycloak:26.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    volumes:
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      # Keycloak 26 exposes health on port 9000, not 8080
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  ferrum-init:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.init
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-ferrum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ferrum}
      POSTGRES_DB: ${POSTGRES_DB:-ferrum}
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-ferrum}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    depends_on:
      postgres: { condition: service_healthy }
      minio: { condition: service_started }
      keycloak: { condition: service_healthy }
    restart: "no"

  ferrum-gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    image: ferrum-gateway:latest
    pull_policy: build
    environment:
      FERRUM_BIND: "0.0.0.0:8080"
      FERRUM_DATABASE__URL: "postgres://${POSTGRES_USER:-ferrum}:${POSTGRES_PASSWORD:-ferrum}@postgres:5432/${POSTGRES_DB:-ferrum}"
      FERRUM_DATABASE__RUN_MIGRATIONS: "true"
      FERRUM_STORAGE__BACKEND: s3
      FERRUM_STORAGE__S3_ENDPOINT: "http://minio:9000"
      FERRUM_STORAGE__S3_REGION: us-east-1
      FERRUM_STORAGE__S3_BUCKET: ${MINIO_BUCKET:-ferrum}
      FERRUM_STORAGE__S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      FERRUM_STORAGE__S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      FERRUM_AUTH__JWKS_URL: "${KEYCLOAK_JWKS_URL:-http://localhost:8081/realms/ferrum/protocol/openid-connect/certs}"
      FERRUM_AUTH__REQUIRE_AUTH: "false"
    depends_on:
      postgres: { condition: service_healthy }
      minio: { condition: service_started }
      ferrum-init: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    restart: unless-stopped

  ferrum-ui:
    build:
      context: ../services/ui
      dockerfile: Dockerfile
    image: ferrum-ui:latest
    pull_policy: build
    depends_on:
      ferrum-gateway: { condition: service_healthy }
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${UI_PORT:-8082}:80"
    volumes:
      - ./nginx-demo.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      ferrum-gateway: { condition: service_healthy }
      ferrum-ui: { condition: service_started }
    restart: unless-stopped

volumes:
  pgdata:
  minio-data:
  keycloak-data:
