apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ferrum.fullname" . }}
  labels:
    {{- include "ferrum.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ferrum.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ferrum.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: ferrum-gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "ferrum.fullname" . }}
            {{- if .Values.existingSecret }}
            - secretRef:
                name: {{ .Values.existingSecret }}
            {{- else if .Values.config.database.url }}
            - secretRef:
                name: {{ include "ferrum.fullname" . }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
