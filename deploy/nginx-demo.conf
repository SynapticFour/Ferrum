# Ferrum demo: reverse proxy to gateway and UI
upstream gateway {
    server ferrum-gateway:8080;
}
upstream ui {
    server ferrum-ui:80;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 100M;

    # API and GA4GH endpoints -> gateway
    location /health { proxy_pass http://gateway; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /ga4gh/ { proxy_pass http://gateway; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /workspaces/ { proxy_pass http://gateway; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /cohorts/ { proxy_pass http://gateway; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /passports/ { proxy_pass http://gateway; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /admin/ { proxy_pass http://gateway; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /openapi.json { proxy_pass http://gateway; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /swagger-ui/ { proxy_pass http://gateway; proxy_http_version 1.1; proxy_set_header Host $host; }

    # Legacy (non-/ga4gh) endpoints used by HelixTest (notably DRS /objects/*).
    # Without this, Nginx falls back to the SPA/UI and HelixTest fails JSON parsing.
    location /objects/ {
        # HelixTest legacy DRS endpoint (/objects/*) should map to GA4GH DRS v1.
        proxy_pass http://gateway/ga4gh/drs/v1/objects/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend -> ferrum-ui
    location / {
        proxy_pass http://ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
